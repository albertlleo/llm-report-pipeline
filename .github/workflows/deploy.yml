name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - "queries/**"
      - "prompts/**"
  workflow_dispatch: # enables the "Run workflow" button in GitHub Actions UI

env:
  PROJECT_ID: acme-prod
  REGION: europe-west1
  REGISTRY: europe-west1-docker.pkg.dev
  REPO: llm-report-pipeline
  SERVICE: llm-report-pipeline

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # Adding --tag github.sha, so we can keep a track of which commit is running. If we use latest, we can't track.
      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/app:${{ github.sha }} \
            --tag ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/app:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/app:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/app:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/app:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --quiet
